#cloud-config
# Ubuntu base VM provisioning
package_update: true
package_upgrade: true
# Set hostname for the VM
hostname: ubuntu-dev-vm
preserve_hostname: false

packages:
   # Development essentials
   - cmake
   - curl
   - direnv
   - fzf
   - gcc
   - g++
   - git
   - git-lfs
   - golang-go
   - htop
   - iputils-ping
   - jq
   - docker.io
   - docker-compose
   - make
   - neovim
   - net-tools
   - nmap
   - openssh-server
   - rsync
   - tar
   - unzip
   - wget
   - zoxide
   - zsh
   - kitty-terminfo
   # System utilities
   - systemd
   - sudo
   - apt-transport-https
   - ca-certificates
   - gnupg
   - lsb-release

users:
  - name: root
    shell: /usr/bin/zsh
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDFPly2MYEeh4FtFtftOa0qasGW4VNIzYv/ZzheQ/dFs martin@fedora

write_files:
  - path: /etc/profile.d/dev-env.sh
    content: |
      export DEV_ENV=ubuntu-base
      export PS1="[ubuntu-dev] \\u@\\h:\\w\\$ "
  - path: /usr/local/bin/k8s-ops
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      # K8s cluster management helper for external clusters

      case "${1:-help}" in
        info)
          echo "=== Kubernetes Cluster Info ==="
          if kubectl cluster-info 2>/dev/null; then
            kubectl cluster-info
            echo ""
            echo "=== Nodes ==="
            kubectl get nodes
            echo ""
            echo "=== Contexts ==="
            kubectl config get-contexts
          else
            echo "No Kubernetes cluster connected"
            echo ""
            echo "To connect to a cluster:"
            echo "  - Set KUBECONFIG environment variable"
            echo "  - Copy cluster kubeconfig to ~/.kube/config"
            echo "  - Use cloud K8s, minikube, or other external cluster"
          fi
          ;;
        nodes)
          kubectl get nodes -o wide
          ;;
        pods)
          kubectl get pods -A
          ;;
        contexts)
          kubectl config get-contexts
          ;;
        current)
          kubectl config current-context
          ;;
        help|*)
          echo "Kubernetes cluster management helper"
          echo ""
          echo "Usage: k8s-ops <command>"
          echo ""
          echo "Commands:"
          echo "  info       Show cluster info and status"
          echo "  nodes      List all nodes"
          echo "  pods       List all pods across namespaces"
          echo "  contexts   List available contexts"
          echo "  current    Show current context"
          echo "  help       Show this help message"
          echo ""
          echo "Note: This template uses external Kubernetes clusters."
          echo "Configure KUBECONFIG or copy cluster config to ~/.kube/config"
          ;;
      esac
  - path: /etc/systemd/system/incus-agent.service
    content: |
      [Unit]
      Description=Incus VM Agent
      After=network.target

      [Service]
      Type=simple
      ExecStart=/usr/sbin/incus-agent --socket /var/lib/incus/devlxd/monitor
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
  - path: /root/.config/opencode/config.json
    content: |
      {
        "$schema": "https://opencode.ai/config.json",
        "plugin": [],
        "permission": {
          "edit": "allow",
          "bash": "ask",
          "skill": "allow",
          "webfetch": "allow",
          "doom_loop": "ask",
          "external_directory": "ask"
        },
        "enabled_providers": [
          "qwen3-5-122b",
        ],
        "provider": {
          "qwen3-5-122b": {
            "npm": "@ai-sdk/openai-compatible",
            "name": "Qwen Provider",
            "options": {
              "baseURL": "http://172.16.100.136:8000/v1"
            },
            "models": {
              "qwen3-5-122b": {
                "name": "Qwen 3.5 122B (local)",
                "variants": {
                  "coding": {
                    "temperature": 0.2,
                    "top_p": 0.9,
                    "repetition_penalty": 1.1,
                    "chat_template_kwargs": {
                      "enable_thinking": false
                    }
                  },
                  "thinking": {
                    "temperature": 0.7,
                    "top_p": 0.95,
                  }
                }
              }
            }
          },
        },
      }

runcmd:
   - export HOME=/root
   - export USER=root
   # Change default shell to zsh
   - chsh -s /usr/bin/zsh root
   # Install opencode
   - curl -fsSL https://opencode.ai/install | bash
   # Install OpenAgentsControl
   - curl -fsSL https://raw.githubusercontent.com/darrenhinde/OpenAgentsControl/main/install.sh | bash -s developer
   # Install NVM
   - curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.4/install.sh | bash
   - export NVM_DIR="$HOME/.nvm" && [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh" && nvm install v25 && nvm use v25
   # Install Bun
   - curl -fsSL https://bun.sh/install | bash
   - /root/.bun/bin/bun add -g @th0rgal/ralph-wiggum
   # Install UV
   - curl -LsSf https://astral.sh/uv/0.10.7/install.sh | sh
   # Install OpenSpec
   - /root/.bun/bin/bun add -g @fission-ai/openspec@latest
   # Install LazyVim
   - git clone https://github.com/Hnatekmar/lazyvim.git ~/.config/nvim
   # Install Oh My Zsh
   - sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended || true
   # Install Oh My Zsh plugins
   - git clone https://github.com/zsh-users/zsh-autosuggestions ${ZSH_CUSTOM:-/root/.oh-my-zsh/custom}/plugins/zsh-autosuggestions || true
   - git clone https://github.com/zsh-users/zsh-syntax-highlighting ${ZSH_CUSTOM:-/root/.oh-my-zsh/custom}/plugins/zsh-syntax-highlighting || true
   # Configure .zshrc with PATH and tool configurations
   - /bin/bash -c 'echo "export ZSH=\"\$HOME/.oh-my-zsh\"" > /root/.zshrc'
   - /bin/bash -c 'echo "export EDITOR=nvim" >> /root/.zshrc'
   - /bin/bash -c 'echo "" >> /root/.zshrc'
   - /bin/bash -c 'echo "# Add tool directories to PATH" >> /root/.zshrc'
   - /bin/bash -c 'echo "export NVM_DIR=\"\$HOME/.nvm\"" >> /root/.zshrc'
   - /bin/bash -c 'echo "export PATH=\"\$HOME/.bun/bin:\$HOME/.opencode/bin:\$HOME/.local/bin:\$PATH\"" >> /root/.zshrc'
   - /bin/bash -c 'echo "" >> /root/.zshrc'
   - /bin/bash -c 'echo "# Load NVM" >> /root/.zshrc'
   - /bin/bash -c 'echo "[ -s \"\$NVM_DIR/nvm.sh\" ] && . \"\$NVM_DIR/nvm.sh\"" >> /root/.zshrc'
   - /bin/bash -c 'echo "" >> /root/.zshrc'
   - /bin/bash -c 'echo "# Source UV environment" >> /root/.zshrc'
   - /bin/bash -c 'echo "[ -s \"\$HOME/.local/bin/env\" ] && source \"\$HOME/.local/bin/env\"" >> /root/.zshrc'
   - /bin/bash -c 'echo "" >> /root/.zshrc'
   - /bin/bash -c 'echo "eval \"\$(zoxide init zsh)\"" >> /root/.zshrc'
   - /bin/bash -c 'echo "" >> /root/.zshrc'
   - /bin/bash -c 'echo "ZSH_THEME=\"3den\"" >> /root/.zshrc'
   - /bin/bash -c 'echo "" >> /root/.zshrc'
   - /bin/bash -c 'echo "plugins=(debian direnv git kubectl fzf ssh-agent zsh-autosuggestions zsh-syntax-highlighting)" >> /root/.zshrc'
   - /bin/bash -c 'echo "source \$ZSH/oh-my-zsh.sh" >> /root/.zshrc'
   # Enable and start Incus agent service
   - systemctl daemon-reload
   - systemctl enable incus-agent
   - systemctl start incus-agent || true
   # Start Docker service
   - systemctl enable docker
   - systemctl start docker
   # Install K3D (for reference, may not work in all environments)
   - curl -sSfL https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash || true
   # Install kubectl from Kubernetes official repo
   - curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.32/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
   - echo 'deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.32/deb/ /' | tee /etc/apt/sources.list.d/kubernetes.list
   - apt-get update
   - apt-get install -y kubectl
   # Install yq
   - curl -sL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -o /usr/local/bin/yq
   - chmod +x /usr/local/bin/yq
   # Install k9s
   - mkdir -p /tmp/k9s-download
   - curl -sS -L https://github.com/derailed/k9s/releases/download/v0.32.5/k9s_Linux_amd64.tar.gz -o /tmp/k9s.tar.gz
   - tar -xzf /tmp/k9s.tar.gz -C /tmp/k9s-download
   - mv /tmp/k9s-download/k9s /usr/local/bin/k9s
   - chmod +x /usr/local/bin/k9s
   - rm -rf /tmp/k9s.tar.gz /tmp/k9s-download
   # Install carvel ytt
   - curl -Lo /tmp/ytt "https://github.com/carvel-dev/ytt/releases/download/v0.47.0/ytt-linux-amd64"
   - mv /tmp/ytt /usr/local/bin/ytt
   - chmod +x /usr/local/bin/ytt
   # Enable SSH
   - systemctl enable ssh
   - systemctl start ssh
   - echo "PermitRootLogin prohibit-password" >> /etc/ssh/sshd_config
   - echo "PasswordAuthentication no" >> /etc/ssh/sshd_config
   # Clean up
   - apt-get clean
   - rm -rf /var/lib/apt/lists/*
   - rm -rf /tmp/*
