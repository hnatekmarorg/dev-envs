#cloud-config
# Fedora base container provisioning
package_update: true
package_upgrade: true
preserve_hostname: true

packages:
  # Development essentials
  - cmake
  - curl
  - direnv
  - fzf 
  - gcc
  - gcc-c++
  - git
  - git-lfs
  - golang
  - htop
  - iputils
  - jq
  - kitty-terminfo
  - kubectl
  - make
  - neovim
  - net-tools
  - nmap
  - openssh-server
  - rsync
  - tar
  - unzip
  - wget
  - yq
  - zoxide
  - zsh
  # System utilities
  - systemd
  - sudo

users:
  - name: root
    shell: /usr/bin/zsh

write_files:
  - path: /etc/profile.d/dev-env.sh
    content: |
      export DEV_ENV=fedora-base
      export PS1="[hnatekmarorg] \\u@\\h:\\w\\$ "
  - path: /root/.zshrc
    content: |
      export ZSH="$HOME/.oh-my-zsh"
      export EDITOR=nvim
      source <(fzf --zsh)
      eval "$(zoxide init zsh)"

      ZSH_THEME="3den"

      plugins=(
          archlinux
          direnv
          git
          kubectl
          ssh-agent
          zsh-autosuggestions
          zsh-syntax-highlighting
      )
      source $ZSH/oh-my-zsh.sh
      export PATH=$PATH:~/.bun/bin/:~/.opencode/bin
      source $HOME/.local/bin/env

  - path: /etc/dnf/dnf.conf
    content: |
      [main]
      gpgcheck=1
      installonly_limit=3
      clean_requirements_on_remove=True
      best=False
      skip_if_unavailable=True
      ip_resolve=4
  - path: /root/.config/opencode/config.json
    content: |
      {
        "$schema": "https://opencode.ai/config.json",
        "plugin": [],
        "permission": {
          "edit": "allow",
          "bash": "ask",
          "skill": "allow",
          "webfetch": "allow",
          "doom_loop": "ask",
          "external_directory": "ask"
        },
        "enabled_providers": [
          "qwen3-5-122b",
        ],
        "provider": {
          "qwen3-5-122b": {
            "npm": "@ai-sdk/openai-compatible",
            "name": "Qwen Provider",
            "options": {
              "baseURL": "https://llm.hnatekmar.dev/qwen3-5-122b/v1"
            },
            "models": {
              "qwen3-5-122b": {
                "name": "Qwen 3.5 122B (local)",
                "variants": {
                  "coding": {
                    "temperature": 0.2,
                    "top_p": 0.9,
                    "repetition_penalty": 1.1,
                    "chat_template_kwargs": {
                      "enable_thinking": false
                    }
                  },
                  "thinking": {
                    "temperature": 0.7,
                    "top_p": 0.95,
                  }
                }
              }
            }
          },
        },
      }

runcmd:
  - export HOME=/root
  - export USER=root
  - curl -fsSL https://opencode.ai/install | bash
  - curl -fsSL https://raw.githubusercontent.com/darrenhinde/OpenAgentsControl/main/install.sh | bash -s developer
  - systemctl enable sshd
  - systemctl start sshd
  - echo "PermitRootLogin prohibit-password" >> /etc/ssh/sshd_config
  - echo "PasswordAuthentication no" >> /etc/ssh/sshd_config
  - KEEP_ZSHRC=yes sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
  - curl -sSfL https://raw.githubusercontent.com/ajeetdsouza/zoxide/main/install.sh | sh
  - git clone https://github.com/Hnatekmar/lazyvim.git ~/.config/nvim
  - curl -fsSL https://bun.sh/install | bash
  - /root/.bun/bin/bun add -g @th0rgal/ralph-wiggum
  - curl -LsSf https://astral.sh/uv/0.10.7/install.sh | sh
