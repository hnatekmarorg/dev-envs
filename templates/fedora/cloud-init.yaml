#cloud-config
# Fedora base VM provisioning
package_update: true
package_upgrade: true
# Set hostname for the VM
hostname: fedora-dev-vm
preserve_hostname: false

packages:
  # Development essentials
  - cmake
  - curl
  - direnv
  - fzf
  - gcc
  - gcc-c++
  - git
  - git-lfs
  - htop
  - iputils
  - jq
  - docker
  - docker-compose
  - kubectl
  - make
  - neovim
  - net-tools
  - nmap
  - openssh-server
  - rsync
  - tar
  - unzip
  - wget
  - yq
  - zoxide
  - zsh
  # System utilities
  - systemd
  - sudo
  - dnf-utils

users:
  - name: root
    shell: /usr/bin/zsh
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDFPly2MYEeh4FtFtftOa0qasGW4VNIzYv/ZzheQ/dFs martin@fedora

write_files:
  - path: /etc/profile.d/dev-env.sh
    content: |
      export DEV_ENV=fedora-base
      export PS1="[hnatekmarorg] \\u@\\h:\\w\\$ "
  - path: /root/.zshrc
    content: |
      export ZSH="$HOME/.oh-my-zsh"
      export EDITOR=nvim
      source <(fzf --zsh)
      eval "$(zoxide init zsh)"

      ZSH_THEME="3den"

      plugins=(
          archlinux
          direnv
          git
          kubectl
          ssh-agent
          zsh-autosuggestions
          zsh-syntax-highlighting
      )
      source $ZSH/oh-my-zsh.sh
      export NVM_DIR="$HOME/.nvm"
      [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
      export PATH=$PATH:~/.bun/bin/:~/.opencode/bin
      source $HOME/.local/bin/env
  - path: /usr/local/bin/k8s-ops
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      # K3D cluster management helper

      case "${1:-help}" in
        start)
          echo "Starting K3D cluster..."
          k3d cluster start || k3d cluster create
          ;;
        stop)
          echo "Stopping K3D cluster..."
          k3d cluster stop
          ;;
        status)
          echo "=== K3D Cluster Status ==="
          k3d cluster list
          echo ""
          echo "=== Kubernetes Nodes ==="
          kubectl get nodes -o wide 2>/dev/null || echo "Cluster not running"
          ;;
        k9s)
          k9s
          ;;
        kubectl)
          shift
          kubectl "$@"
          ;;
        logs)
          k3d node logs $(k3d node list | grep server | awk '{print $1}')
          ;;
        help|*)
          echo "K3D Kubernetes cluster management helper"
          echo ""
          echo "Usage: k8s-ops <command>"
          echo ""
          echo "Commands:"
          echo "  start      Start/create K3D cluster"
          echo "  stop       Stop K3D cluster"
          echo "  status     Show cluster status and nodes"
          echo "  k9s        Launch k9s terminal UI"
          echo "  kubectl    Run kubectl commands"
          echo "  logs       Follow cluster logs"
          echo "  help       Show this help message"
          ;;
      esac

runcmd:
  - export HOME=/root
  - export USER=root
  # Change default shell to zsh
  - chsh -s /usr/bin/zsh root
  # Install K3D
  - curl -sSfL https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
  # Install Docker
  - systemctl enable docker
  - systemctl start docker
  - usermod -aG docker root
  # Install K3S (for kubectl)
  - curl -sSfL https://get.k3s.io | INSTALL_K3S_EXEC="--disable traefik" sh -
  - mkdir -p /root/.kube
  - cp /etc/rancher/k3s/k3s.yaml /root/.kube/config
  # Install k9s
  - mkdir -p /tmp/k9s-download
  - curl -sS -L https://github.com/derailed/k9s/releases/download/v0.32.5/k9s_Linux_amd64.tar.gz -o /tmp/k9s.tar.gz
  - tar -xzf /tmp/k9s.tar.gz -C /tmp/k9s-download
  - mv /tmp/k9s-download/k9s /usr/local/bin/k9s
  - chmod +x /usr/local/bin/k9s
  - rm -rf /tmp/k9s.tar.gz /tmp/k9s-download
  # Install carvel ytt
  - curl -Lo /tmp/ytt "https://github.com/carvel-dev/ytt/releases/download/v0.47.0/ytt-linux-amd64"
  - mv /tmp/ytt /usr/local/bin/ytt
  - chmod +x /tmp/ytt
  # Install Bun
  - curl -fsSL https://bun.sh/install | bash
  - /root/.bun/bin/bun add -g @th0rgal/ralph-wiggum
  # Install NVM
  - curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.4/install.sh | bash
  - export NVM_DIR="$HOME/.nvm" && [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh" && nvm install v25 && nvm use v25
  # Install UV
  - curl -LsSf https://astral.sh/uv/0.10.7/install.sh | sh
  # Install OpenSpec
  - /root/.bun/bin/bun add -g @fission-ai/openspec@latest
  # Install LazyVim
  - git clone https://github.com/Hnatekmar/lazyvim.git ~/.config/nvim
  # Install Oh My Zsh
  - sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended || true
  # Install zsh-autosuggestions and zsh-syntax-highlighting plugins
  - git clone https://github.com/zsh-users/zsh-autosuggestions ${ZSH_CUSTOM:-/root/.oh-my-zsh/custom}/plugins/zsh-autosuggestions
  - git clone https://github.com/zsh-users/zsh-syntax-highlighting ${ZSH_CUSTOM:-/root/.oh-my-zsh/custom}/plugins/zsh-syntax-highlighting
  # Install direnv
  - curl -sfL https://direnv.net/direnv/bin/release/latest/direnv.linux-amd64 -o /usr/local/bin/direnv
  - chmod +x /usr/local/bin/direnv
  # Enable SSH
  - systemctl enable sshd
  - systemctl start sshd
  - echo "PermitRootLogin prohibit-password" >> /etc/ssh/sshd_config
  - echo "PasswordAuthentication no" >> /etc/ssh/sshd_config
  # Clean up
  - dnf clean all
  - rm -rf /var/cache/dnf/*
  - rm -rf /tmp/*
