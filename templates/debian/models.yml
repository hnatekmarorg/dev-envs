providers:
  glm:
    baseUrl: https://sota.hnatekmar.dev/v1
    apiKey: sk
    api: openai-completions
    models:
      # Model 1: Heavy Reasoning
      - id: QuantTrio/GLM-4.7-AWQ
        name: "GLM 4.7"
        reasoning: true
        cost:
          input: 0
          output: 0
          cacheRead: 0
          cacheWrite: 0
        contextWindow: 80000
        maxTokens: 16384
        input:
          - text
        temperature: 1.0
        top_p: 0.95
        presence_penalty: 1.5
  # --- PRIMARY PROVIDER ---
  qwen-thinking:
    baseUrl: https://sota.hnatekmar.dev/v1
    apiKey: sk
    api: openai-completions
    models:
      # Model 1: Heavy Reasoning
      - id: Qwen/Qwen3.5-122B-A10B-FP8
        name: "Qwen3.5 (reasoning)"
        reasoning: true
        roles:
          - plan
          - slow
        cost:
          input: 0
          output: 0
          cacheRead: 0
          cacheWrite: 0
        contextWindow: 262144
        compat:
          thinkingFormat: "qwen-chat-template"
          extraBody:
            enable_thinking: true # CRITICAL: This triggers the actual reasoning phase
            top_k: 20
            min_p: 0.0
            repetition_penalty: 1.0
        maxTokens: 32000
        input:
          - text
          - image
        temperature: 1.0
        top_p: 0.95
        presence_penalty: 1.5
  qwen-coding:
    baseUrl: https://sota.hnatekmar.dev/v1
    apiKey: sk
    api: openai-completions
    models:
      - id: Qwen/Qwen3.5-122B-A10B-FP8
        name: "Qwen3.5 (coding)"
        reasoning: false
        roles:
          - default # Primary conversational and execution model
        cost:
          input: 0
          output: 0
          cacheRead: 0
          cacheWrite: 0
        contextWindow: 262144
        maxTokens: 32000
        input:
          - text
          - image
        temperature: 1.0
        top_p: 0.8
        presence_penalty: 0.0
        compat:
          thinkingFormat: "qwen-chat-template"
          extraBody:
            top_k: 20
            min_p: 0.0
            repetition_penalty: 1.0
            chat_template_kwargs:
              enable_thinking: false

  minimax:
    #baseurl: http://172.16.100.136:8000/v1
    baseUrl: https://sota.hnatekmar.dev/v1
    apiKey: sk
    api: openai-completions
    models:
      - id: QuantTrio/MiniMax-M2.5-AWQ
        name: "Minimax 2.5"
        reasoning: true
        cost:
          input: 0
          output: 0
          cacheRead: 0
          cacheWrite: 0
        contextWindow: 262144
        maxTokens: 32000
        input:
          - text
        temperature: 1.0
        top_p: 0.95
        presence_penalty: 0.0
        compat:
          extraBody:
            top_k: 40

  # --- FAST PROVIDER (For lightweight tasks) ---
  fast:
    baseUrl: https://fast.hnatekmar.dev/v1
    apiKey: sk
    api: openai-completions
    models:
      - id: Qwen/Qwen3.5-35B-A3B-FP8
        name: "Qwen/Qwen3.5-35B-A3B-FP8"
        reasoning: false
        roles:
          - smol # Handles rapid background tasks
          - commit # Handles git diff summarization
        cost:
          input: 0
          output: 0
          cacheRead: 0
          cacheWrite: 0
        contextWindow: 262144
        maxTokens: 65536
        repetition_penalty: 1.0
        input:
          - text
          - image
        temperature: 1.0
        top_p: 0.95
        extraBody:
          top_k: 20
      # Model 3: Fast Coder Next
      - id: Qwen/Qwen3-Coder-Next-FP8
        name: "Qwen next coder"
        reasoning: false
        roles:
          - smol # Handles rapid background tasks
          - commit # Handles git diff summarization
        cost:
          input: 0
          output: 0
          cacheRead: 0
          cacheWrite: 0
        contextWindow: 262144
        maxTokens: 65536
        input:
          - text # Text only, per your config
        temperature: 1.0
        top_p: 0.95
        extraBody:
          top_k: 40
