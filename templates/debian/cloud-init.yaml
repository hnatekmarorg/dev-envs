#cloud-config
# Debian base VM provisioning
hostname: debian-dev-vm
preserve_hostname: false

packages:
   - build-essential
   - curl
   - git
   - git-lfs
   - htop
   - iputils-ping
   - jq
   - make
   - net-tools
   - nmap
   - openssh-server
   - rsync
   - tar
   - unzip
   - wget
   - systemd
   - sudo
   - ca-certificates
   - gnupg
   - lsb-release
   - kubectl
   - neovim
   - zsh
   - kitty-terminfo
   - zoxide
   - fzf
   - direnv
   - cmake
   - gcc
   - g++
   - golang-go

users:
  - name: root
    shell: /usr/bin/zsh
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDFPly2MYEeh4FtFtftOa0qasGW4VNIzYv/ZzheQ/dFs martin@fedora
  - name: dev
    shell: /usr/bin/zsh
    groups: sudo,docker
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDFPly2MYEeh4FtFtftOa0qasGW4VNIzYv/ZzheQ/dFs martin@fedora

write_files:
  - path: /etc/profile.d/dev-env.sh
    content: |
      export DEV_ENV=debian-base
      export PS1="[debian-dev] \\u@\\h:\\w\\$ "
  - path: /usr/local/bin/k8s-ops
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      # Kubernetes management helper

      case "${1:-help}" in
        status)
          echo "=== Kubernetes Cluster Info ==="
          if kubectl cluster-info 2>/dev/null; then
            kubectl cluster-info
            echo ""
            echo "=== Kubernetes Nodes ==="
            kubectl get nodes -o wide 2>/dev/null || echo "No nodes available"
          else
            echo "No Kubernetes cluster connected"
            echo "Connect to a cluster with: kubectl config use-context <context>"
          fi
          ;;
        nodes) kubectl get nodes -o wide ;;
        pods) kubectl get pods -A ;;
        contexts) kubectl config get-contexts ;;
        current) kubectl config current-context ;;
        k9s)
          k9s
          ;;
        kubectl)
          shift
          kubectl "$@"
          ;;
        help|*)
          echo "Kubernetes management helper"
          echo ""
          echo "Usage: k8s-ops <command>"
          echo ""
          echo "Commands:"
          echo "  status     Show cluster info and nodes"
          echo "  nodes      List all Kubernetes nodes"
          echo "  pods       List all pods across namespaces"
          echo "  contexts   Show available contexts"
          echo "  current    Show current context"
          echo "  k9s        Launch k9s terminal UI"
          echo "  kubectl    Run kubectl commands"
          echo "  help       Show this help message"
          ;;
      esac
  - path: /etc/systemd/system/incus-agent.service
    content: |
      [Unit]
      Description=Incus VM Agent
      After=network.target
      [Service]
      Type=simple
      ExecStart=/usr/sbin/incus-agent --socket /var/lib/incus/devlxd/monitor
      Restart=always
      RestartSec=5
      [Install]
      WantedBy=multi-user.target
  - path: /root/.config/opencode/config.json
    content: |
      {
        "$schema": "https://opencode.ai/config.json",
        "plugin": [],
        "permission": {
          "edit": "allow",
          "bash": "ask",
          "skill": "allow",
          "webfetch": "allow",
          "doom_loop": "ask",
          "external_directory": "ask"
        },
        "enabled_providers": ["qwen3-5-122b"],
        "provider": {
          "qwen3-5-122b": {
            "npm": "@ai-sdk/openai-compatible",
            "name": "Qwen Provider",
            "options": {
              "baseURL": "http://172.16.100.136:8000/v1"
            },
            "models": {
              "qwen3-5-122b": {
                "name": "Qwen 3.5 122B (local)",
                "variants": {
                  "coding": {
                    "temperature": 0.2,
                    "top_p": 0.9,
                    "repetition_penalty": 1.1,
                    "chat_template_kwargs": {
                      "enable_thinking": false
                    }
                  },
                  "thinking": {
                    "temperature": 0.7,
                    "top_p": 0.95
                  }
                }
              }
            }
          }
        }
      }

runcmd:
  - export HOME=/root
  - export USER=root
  - chsh -s /usr/bin/zsh root
  - chsh -s /usr/bin/zsh dev
  - su - dev -c 'timeout 120 curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh | /bin/bash' || echo "Homebrew install failed"
  - echo 'eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"' >> /home/dev/.zshrc
  - echo 'eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"' >> /home/dev/.bashrc
  - chown dev:dev /home/dev/.zshrc
  - chown dev:dev /home/dev/.bashrc
  - timeout 60 curl -fsSL https://opencode.ai/install | bash || echo "OpenCode install failed"
  - nohup bash -c 'timeout 300 curl -fsSL https://raw.githubusercontent.com/darrenhinde/OpenAgentsControl/main/install.sh | bash -s developer > /var/log/opagents-install.log 2>&1' > /dev/null 2>&1 &
  - timeout 60 curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.4/install.sh | bash || echo "NVM install failed"
  - export NVM_DIR="$HOME/.nvm" && [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh" && nvm install v25 && nvm use v25 || true
  - timeout 60 curl -fsSL https://bun.sh/install | bash || echo "Bun install failed"
  - /root/.bun/bin/bun add -g @th0rgal/ralph-wiggum || true
  - timeout 60 curl -LsSf https://astral.sh/uv/0.10.7/install.sh | sh || echo "UV install failed"
  - /root/.bun/bin/bun add -g @fission-ai/openspec@latest || true
  - timeout 120 git clone https://github.com/Hnatekmar/lazyvim.git ~/.config/nvim || echo "LazyVim clone failed"
  # Install k9s
  - mkdir -p /tmp/k9s-download
  - curl -sS -L https://github.com/derailed/k9s/releases/download/v0.32.5/k9s_Linux_amd64.tar.gz -o /tmp/k9s.tar.gz
  - tar -xzf /tmp/k9s.tar.gz -C /tmp/k9s-download
  - mv /tmp/k9s-download/k9s /usr/local/bin/k9s
  - chmod +x /usr/local/bin/k9s
  - rm -rf /tmp/k9s.tar.gz /tmp/k9s-download
  # Install Carvel ytt
  - curl -Lo /tmp/ytt "https://github.com/carvel-dev/ytt/releases/download/v0.47.0/ytt-linux-amd64"
  - mv /tmp/ytt /usr/local/bin/ytt
  - chmod +x /usr/local/bin/ytt
  - |
    rm -rf /root/.oh-my-zsh
    ZSH=/root/.oh-my-zsh RUNZSH=no CHSH=no /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" || echo "Oh My Zsh install failed"
  - timeout 60 git clone https://github.com/zsh-users/zsh-autosuggestions /root/.oh-my-zsh/custom/plugins/zsh-autosuggestions || true
  - timeout 60 git clone https://github.com/zsh-users/zsh-syntax-highlighting /root/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting || true
  - /bin/bash -c 'printf "%s\n" "export ZSH=\"/root/.oh-my-zsh\"" "export EDITOR=nvim" "export NVM_DIR=\"/root/.nvm\"" "export PATH=\"/root/.bun/bin:/root/.opencode/bin:/root/.local/bin:/home/linuxbrew/.linuxbrew/bin:\$PATH\"" "[ -s \"\$NVM_DIR/nvm.sh\" ] && . \"\$NVM_DIR/nvm.sh\"" "[ -s \"/root/.local/bin/env\" ] && source \"/root/.local/bin/env\"" "eval \"\$(zoxide init zsh)\"" "ZSH_THEME=\"3den\"" "plugins=(debian direnv git kubectl fzf ssh-agent zsh-autosuggestions zsh-syntax-highlighting)" "source \$ZSH/oh-my-zsh.sh" > /root/.zshrc'
  - systemctl daemon-reload
  - systemctl enable incus-agent
  - systemctl start incus-agent || true
  - systemctl enable ssh
  - systemctl start ssh
  - systemctl enable ssh
  - systemctl start ssh
  - echo "PermitRootLogin prohibit-password" >> /etc/ssh/sshd_config
  - echo "PasswordAuthentication no" >> /etc/ssh/sshd_config
  - usermod -aG docker dev
  - apt-get clean
  - rm -rf /var/lib/apt/lists/*
  - rm -rf /tmp/*
