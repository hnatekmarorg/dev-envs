#cloud-config
# Debian base VM provisioning
hostname: debian-dev-vm
preserve_hostname: false

# Install minimal packages via cloud-init (fast, reliable)
packages:
  - curl
  - wget
  - git
  - openssh-server
  - sudo
  - ca-certificates
  - gnupg
  - tmux

# Single user model: devuser (consistent with Docker container)
# Root SSH login is disabled for security - use 'sudo' from devuser
users:
  - name: devuser
    shell: /usr/bin/zsh
    groups: sudo, docker
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDFPly2MYEeh4FtFtftOa0qasGW4VNIzYv/ZzheQ/dFs martin@fedora

# Disable direct root SSH login (security best practice)
disable_root: true

write_files:
  - path: /etc/profile.d/dev-env.sh
    content: |
      export DEV_ENV=debian-base
      export PS1="[debian-dev] \\u@\\h:\\w\\$ "
  - path: /usr/local/bin/k8s-ops
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      # Kubernetes management helper

      case "${1:-help}" in
        status)
          echo "=== Kubernetes Cluster Info ==="
          if kubectl cluster-info 2>/dev/null; then
            kubectl cluster-info
            echo ""
            echo "=== Kubernetes Nodes ==="
            kubectl get nodes -o wide 2>/dev/null || echo "No nodes available"
          else
            echo "No Kubernetes cluster connected"
            echo "Connect to a cluster with: kubectl config use-context <context>"
          fi
          ;;
        nodes) kubectl get nodes -o wide ;;
        pods) kubectl get pods -A ;;
        contexts) kubectl config get-contexts ;;
        current) kubectl config current-context ;;
        k9s)
          k9s
          ;;
        kubectl)
          shift
          kubectl "$@"
          ;;
        help|*)
          echo "Kubernetes management helper"
          echo ""
          echo "Usage: k8s-ops <command>"
          echo ""
          echo "Commands:"
          echo "  status     Show cluster info and nodes"
          echo "  nodes      List all Kubernetes nodes"
          echo "  pods       List all pods across namespaces"
          echo "  contexts   Show available contexts"
          echo "  current    Show current context"
          echo "  k9s        Launch k9s terminal UI"
          echo "  kubectl    Run kubectl commands"
          echo "  help       Show this help message"
          ;;
      esac
  - path: /etc/systemd/system/incus-agent.service
    content: |
      [Unit]
      Description=Incus VM Agent
      After=network.target
      [Service]
      Type=simple
      ExecStart=/usr/sbin/incus-agent --socket /var/lib/incus/devlxd/monitor
      Restart=always
      RestartSec=5
      [Install]
      WantedBy=multi-user.target
  - path: /home/devuser/.zshrc.final
    permissions: '0644'
    defer: true
    owner: devuser:devuser
    content: |
      export ZSH="/home/devuser/.oh-my-zsh"
      export EDITOR=nvim
      export NVM_DIR="$HOME/.nvm"

      # Load nvm
      [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
      [ -s "$NVM_DIR/bash_completion" ] && . "$NVM_DIR/bash_completion"

      # Load direnv
      eval "$(direnv hook zsh)"

      # Path
      export PATH="/home/devuser/.bun/bin:/home/devuser/.local/bin:/home/linuxbrew/.linuxbrew/bin:$PATH"

      # Zoxide
      eval "$(zoxide init zsh)"

      # Oh My Zsh
      ZSH_THEME="3den"
      plugins=(debian direnv git kubectl fzf ssh-agent zsh-autosuggestions zsh-syntax-highlighting)
      source $ZSH/oh-my-zsh.sh

      # OpenBao
      export BAO_ADDR="https://bao.hnatekmar.xyz"
      export BAO_TOKEN="${BAO_TOKEN:-}"
      alias bao-ssh="bao ssh"

      # Dotfiles sync helper
      alias dotsync="chezmoi apply"

      # Docker & Kind
      alias d='docker'
      alias dc='docker compose'
      alias dps='docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"'
      alias di='docker images --format "table {{.Repository}}:{{.Tag}}\t{{.Size}}"'
      alias kcl='kind delete cluster'
  - path: /usr/local/bin/setup-devuser.sh
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      set -e

      echo "=== Setting up devuser environment ==="

      # Wait for network to be fully ready (prevents download timeouts)
      echo "Waiting for network..."
      for i in {1..30}; do
        if curl -s --connect-timeout 5 https://deb.debian.org > /dev/null 2>&1; then
          echo "Network ready after ${i}s"
          break
        fi
        echo "Waiting for network... attempt $i/30"
        sleep 2
      done

      # Create missing polkit directories (suppresses harmless warnings)
      mkdir -p /run/polkit-1/rules.d /usr/local/share/polkit-1/rules.d

      # Update apt with retry
      echo "Updating apt..."
      for i in 1 2 3; do
        apt-get update && break || { echo "Retry $i..."; sleep 5; }
      done

      # Install all development packages
      echo "Installing development packages..."
      DEBIAN_FRONTEND=noninteractive apt-get install -y \
        build-essential \
        fd-find \
        git-lfs \
        htop \
        jq \
        make \
        nmap \
        ripgrep \
        rsync \
        tar \
        unzip \
        systemd \
        lsb-release \
        neovim \
        zsh \
        kitty-terminfo \
        zoxide \
        fzf \
        direnv \
        cmake \
        gcc \
        g++ \
        golang-go || echo "Some packages failed to install"

      # Configure devuser shell
      chsh -s /usr/bin/zsh devuser

      # Ensure docker group exists
      getent group docker || groupadd docker

      # Install Homebrew as devuser (skip if /home/linuxbrew exists)
      echo "Installing Homebrew..."
      if [ ! -d /home/linuxbrew ]; then
        for attempt in 1 2 3; do
          echo "Homebrew attempt $attempt..."
          if su - devuser -c 'curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh | /bin/bash'; then
            echo "Homebrew installed"
            break
          fi
          echo "Homebrew attempt $attempt failed, retrying in 10s..."
          sleep 10
        done || echo "Homebrew install failed after 3 attempts"
      fi
      su - devuser -c 'echo "eval \"\$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)\"" >> /home/devuser/.bashrc' 2>/dev/null || true
      chown devuser:devuser /home/devuser/.bashrc 2>/dev/null || true

      # Install NVM and Node.js
      echo "Installing NVM..."
      for attempt in 1 2 3; do
        echo "NVM attempt $attempt..."
        if su - devuser -c 'curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.4/install.sh | bash'; then
          echo "NVM installed"
          break
        fi
        echo "NVM attempt $attempt failed, retrying in 10s..."
        sleep 10
      done || echo "NVM install failed after 3 attempts"
      
      # Install Node.js
      echo "Installing Node.js..."
      su - devuser -c '[ -s "$HOME/.nvm/nvm.sh" ] && . "$HOME/.nvm/nvm.sh" && nvm install v25 && nvm use v25' || echo "Node.js install failed"

      # Install Bun (with retries)
      echo "Installing Bun..."
      for attempt in 1 2 3; do
        echo "Bun attempt $attempt..."
        if su - devuser -c 'curl -fsSL https://bun.com/install | bash'; then
          echo "Bun installed"
          break
        fi
        echo "Bun attempt $attempt failed, retrying in 10s..."
        sleep 10
      done || echo "Bun install failed after 3 attempts"
      
      # Verify and install pi
      if su - devuser -c '/home/devuser/.bun/bin/bun --version' 2>/dev/null; then
        echo "Installing pi-coding-agent..."
        su - devuser -c '/home/devuser/.bun/bin/bun add -g @mariozechner/pi-coding-agent' || echo "pi-coding-agent install failed"
      else
        echo "Bun not working, skipping pi install"
      fi

      # Install kubectl from Kubernetes official repo
      echo "Installing kubectl..."
      curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.32/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg || true
      echo 'deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.32/deb/ /' | tee /etc/apt/sources.list.d/kubernetes.list > /dev/null || true
      apt-get update || true
      apt-get install -y kubectl || true

      # Install neovim v0.12.1
      echo "Installing neovim v0.12.1..."
      curl -sL https://github.com/neovim/neovim/releases/download/v0.12.1/nvim-linux-x86_64.tar.gz -o /tmp/nvim.tar.gz && \
        tar -xzf /tmp/nvim.tar.gz --strip-components=1 --overwrite -C /usr && \
        rm -rf /tmp/nvim.tar.gz || echo "Neovim install failed"

      # Install k9s
      echo "Installing k9s..."
      mkdir -p /tmp/k9s-download
      curl -sS -L https://github.com/derailed/k9s/releases/download/v0.32.5/k9s_Linux_amd64.tar.gz -o /tmp/k9s.tar.gz && \
        tar -xzf /tmp/k9s.tar.gz -C /tmp/k9s-download && \
        mv /tmp/k9s-download/k9s /usr/local/bin/k9s && \
        chmod +x /usr/local/bin/k9s && \
        rm -rf /tmp/k9s.tar.gz /tmp/k9s-download || echo "k9s install failed"

      # Install Carvel ytt
      echo "Installing ytt..."
      curl -sLo /tmp/ytt "https://github.com/carvel-dev/ytt/releases/download/v0.47.0/ytt-linux-amd64" && \
        mv /tmp/ytt /usr/local/bin/ytt && \
        chmod +x /usr/local/bin/ytt || echo "ytt install failed"

      # Install chezmoi (dotfiles manager)
      echo "Installing chezmoi..."
      curl -sfL https://git.io/chezmoi | sh || echo "chezmoi install failed"

      # Install OpenBao CLI
      echo "Installing OpenBao CLI..."
      BAO_VERSION="2.3.0"
      curl -sLo /tmp/bao.zip "https://releases.openbao.org/bao/${BAO_VERSION}/bao_${BAO_VERSION}_linux_amd64.zip" && \
        unzip -o /tmp/bao.zip -d /usr/local/bin/ && \
        rm /tmp/bao.zip && \
        chmod +x /usr/local/bin/bao || echo "OpenBao install failed"

      # Install Docker
      echo "Installing Docker..."
      curl -fsSL https://get.docker.com | sh || echo "Docker install failed"
      usermod -aG docker devuser

      # Install Kind (Kubernetes in Docker)
      echo "Installing Kind..."
      KIND_VERSION="v0.26.0"
      curl -sLo /usr/local/bin/kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64" && \
        chmod +x /usr/local/bin/kind || echo "Kind install failed"

      # Install Helm
      echo "Installing Helm..."
      HELM_VERSION="v3.17.2"
      curl -sSL "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz" -o /tmp/helm.tar.gz && \
        tar -xzf /tmp/helm.tar.gz -C /tmp && \
        mv /tmp/linux-amd64/helm /usr/local/bin/helm && \
        chmod +x /usr/local/bin/helm && \
        rm -rf /tmp/helm.tar.gz /tmp/linux-amd64 || echo "Helm install failed"

      # Install Oh My Zsh for devuser
      echo "Installing Oh My Zsh..."
      su - devuser -c 'rm -rf /home/devuser/.oh-my-zsh /home/devuser/.zshrc' || true
      su - devuser -c 'ZSH=/home/devuser/.oh-my-zsh RUNZSH=no CHSH=no /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"' || echo "Oh My Zsh install failed"
      su - devuser -c 'timeout 60 git clone https://github.com/zsh-users/zsh-autosuggestions /home/devuser/.oh-my-zsh/custom/plugins/zsh-autosuggestions' || true
      su - devuser -c 'timeout 60 git clone https://github.com/zsh-users/zsh-syntax-highlighting /home/devuser/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting' || true

      # Apply final .zshrc (after Oh My Zsh installation)
      cp /home/devuser/.zshrc.final /home/devuser/.zshrc
      chown devuser:devuser /home/devuser/.zshrc
      rm -f /home/devuser/.zshrc.final

      # Enable and start services
      systemctl daemon-reload
      systemctl enable incus-agent
      systemctl start incus-agent || true
      systemctl enable ssh
      systemctl start ssh
      echo "PermitRootLogin prohibit-password" >> /etc/ssh/sshd_config
      echo "PasswordAuthentication no" >> /etc/ssh/sshd_config
      
      # Enable Docker service
      systemctl enable docker
      systemctl start docker || echo "Docker service failed to start"

      # Unlock devuser account (allows SSH with keys)
      passwd -u devuser 2>/dev/null || true

      # Cleanup
      apt-get clean
      rm -rf /var/lib/apt/lists/*
      rm -rf /tmp/*

      echo "=== Setup complete ==="

runcmd:
  - bash /usr/local/bin/setup-devuser.sh
